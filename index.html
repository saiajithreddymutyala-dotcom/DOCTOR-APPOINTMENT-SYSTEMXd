<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hospital OP Booking System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f7fb;
}

/* LOGIN + SIGNUP */
.auth-page{
    display:flex;
    height:100vh;
}

.left-panel{
    flex:1;
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.left-panel h1{
    font-size:42px;
    margin-bottom:15px;
}

.left-panel p{
    font-size:18px;
    opacity:0.9;
}

.auth-box{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:white;
    padding:40px;
}

.auth-box h2{
    font-size:32px;
    margin-bottom:10px;
}

.subtitle{
    color:gray;
    margin-bottom:25px;
}

.auth-box input{
    width:320px;
    padding:14px;
    margin:10px 0;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
}

.auth-box button{
    width:320px;
    padding:14px;
    margin-top:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.signup-btn{
    background:#16a34a;
}

/* DASHBOARD */
.dashboard{
    display:none;
}

.sidebar{
    width:220px;
    height:100vh;
    background:#0f172a;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar button{
    margin-top:20px;
    width:100%;
    padding:10px;
    background:#2563eb;
    border:none;
    color:white;
    border-radius:8px;
}

.main{
    margin-left:240px;
    padding:30px;
}

.content{
    display:flex;
    gap:20px;
}

.booking-card{
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    flex:1;
}

.booking-card h3{
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.form-group input,
.form-group select{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:10px;
}

.fee-box{
    margin-top:15px;
    margin-bottom:20px;
    background:#f0fdf4;
    color:#15803d;
    padding:14px;
    border-radius:10px;
    font-weight:bold;
    text-align:center;
}

.booking-card button{
    width:100%;
    padding:14px;
    background:linear-gradient(90deg,#2563eb,#1d4ed8);
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.token-box{
    margin-top:15px;
    padding:15px;
    background:#e0f2fe;
    border-radius:8px;
    font-weight:bold;
}

.history-card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    flex:1;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="authSection" class="auth-page">

    <div class="left-panel">
        <h1>Hospital OP Booking</h1>
        <p>Fast • Secure • Easy Appointment Booking</p>
    </div>

    <div class="auth-box">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to continue</p>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <button class="signup-btn" onclick="signup()">Signup</button>
    </div>

</div>
<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

    <div class="sidebar">
        <h2>Hospital OP</h2>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="main">

        <h1>Doctor Appointment Booking</h1>

        <div class="content">

            <div class="booking-card">

                <h3>Book Appointment</h3>

                <div class="form-group">
                    <label>Patient Name</label>
                    <input type="text" id="patientName">
                </div>

                <div class="form-group">
                    <label>Select Doctor</label>
                    <select id="doctor">
                        <option>Dr. Smith - General</option>
                        <option>Dr. John - Cardiology</option>
                        <option>Dr. Priya - Orthopedic</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Choose Slot</label>
                    <select id="slot">
                        <option>09:00 AM</option>
                        <option>10:00 AM</option>
                        <option>11:00 AM</option>
                        <option>02:00 PM</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="paymentMethod">
                        <option>UPI</option>
                        <option>Card</option>
                        <option>Cash</option>
                    </select>
                </div>

                <div class="fee-box">
                    Consultation Fee: ₹500
                </div>

                <button onclick="bookAppointment()">Pay & Generate Token</button>

                <div class="token-box" id="tokenResult"></div>

            </div>

            <div class="history-card">

                <h3>Patient History</h3>

                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Doctor</th>
                            <th>Slot</th>
                            <th>Token</th>
                            <th>Payment</th>
                        </tr>
                    </thead>

                    <tbody id="history"></tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>
function signup(){
    let user=document.getElementById("username").value;
    let pass=document.getElementById("password").value;

    localStorage.setItem("username",user);
    localStorage.setItem("password",pass);

    alert("Signup Successful");
}

function login(){
    let user=document.getElementById("username").value;
    let pass=document.getElementById("password").value;

    if(user===localStorage.getItem("username") &&
       pass===localStorage.getItem("password")){

        document.getElementById("authSection").style.display="none";
        document.getElementById("dashboard").style.display="block";

        displayHistory();

    }else{
        alert("Invalid Credentials");
    }
}

function logout(){
    location.reload();
}

function bookAppointment(){

    let name=document.getElementById("patientName").value;
    let doctor=document.getElementById("doctor").value;
    let slot=document.getElementById("slot").value;
    let payment=document.getElementById("paymentMethod").value;

    let token=Math.floor(Math.random()*900)+100;

    document.getElementById("tokenResult").innerHTML=
    `Token Number: ${token}<br>Payment Successful via ${payment}`;

    let history=JSON.parse(localStorage.getItem("history")) || [];

    history.push({name,doctor,slot,token,payment});

    localStorage.setItem("history",JSON.stringify(history));

    displayHistory();
}

function displayHistory(){

    let history=JSON.parse(localStorage.getItem("history")) || [];
    let rows="";

    history.forEach(item=>{
        rows+=`
        <tr>
            <td>${item.name}</td>
            <td>${item.doctor}</td>
            <td>${item.slot}</td>
            <td>${item.token}</td>
            <td>${item.payment}</td>
        </tr>
        `;
    });

    document.getElementById("history").innerHTML=rows;
}
</script>

</body>
</html>
